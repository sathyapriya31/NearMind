# BuildPortal 🚀 Configuration File
# Place this file in your project's root folder.

version: 1
platform: ios

xcode_cloud:
  # (Optional) Specify the exact workflow name to run in Xcode Cloud.
  # If left commented or blank, BuildPortal will automatically fall back
  # to the primary default workflow configured for your product.
  workflow_name: "Release Workflow"

  # (Optional) Direct workflow ID from App Store Connect.
  # Only use this if you want to pin this configuration to a specific workflow ID.
  # workflow_id: "a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d"

  # (Optional) Target App Bundle Identifier to match against your Xcode target.
  # bundle_id: "com.spritle.nearmind"

  # (Optional) Automatically autolink TestFlight upon successful build.
  testflight: true
